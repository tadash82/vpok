name: Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: videopoker-windows
            artifact_path: dist/videopoker.exe
          - os: ubuntu-latest
            artifact_name: videopoker-linux
            artifact_path: dist/videopoker
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-build.txt

      - name: Run tests
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: python -m pytest tests/ -q

      - name: Build executable with PyInstaller
        run: pyinstaller --clean --noconfirm videopoker.spec

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename Linux binary for clarity
        run: |
          mv artifacts/videopoker-linux/videopoker artifacts/videopoker-linux/videopoker-linux
          mv artifacts/videopoker-windows/videopoker.exe artifacts/videopoker-windows/videopoker-windows.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/videopoker-windows/videopoker-windows.exe
            artifacts/videopoker-linux/videopoker-linux
          generate_release_notes: true
          draft: false
          prerelease: false
